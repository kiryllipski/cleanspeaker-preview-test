<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting · ProxyShield</title>
<link rel="stylesheet" href="../components/shared.css">
<style>
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 28%, rgba(34, 230, 195, 0.18) 0%, rgba(14, 165, 233, 0.08) 35%, rgba(5, 10, 20, 0) 60%),
      var(--bg);
  }
  .stage {
    position: relative;
    width: 280px; height: 280px;
    margin: 4px auto 16px;
  }
  .ring {
    position: absolute; border-radius: 50%; pointer-events: none;
  }
  .r0 { inset: 0; border: 1px solid rgba(56, 80, 111, 0.4); }
  .r1 { inset: 22px; border: 1px solid rgba(56, 80, 111, 0.6); }
  .r2 { inset: 44px; border: 1px solid rgba(56, 80, 111, 0.85); }
  .r3 {
    inset: 60px;
    border: 1.5px dashed var(--primary);
    box-shadow: 0 0 28px rgba(34, 230, 195, 0.35), inset 0 0 18px rgba(34, 230, 195, 0.18);
  }
  .sweep {
    position: absolute; inset: 60px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(46,242,208,0.0) 0deg, rgba(46,242,208,0.0) 250deg, var(--primary-glow) 340deg, transparent 360deg);
    -webkit-mask: radial-gradient(circle, transparent 76px, #000 76px, #000 80px, transparent 80px);
            mask: radial-gradient(circle, transparent 76px, #000 76px, #000 80px, transparent 80px);
    filter: drop-shadow(0 0 10px rgba(46, 242, 208, 0.7));
  }
  .core {
    position: absolute; inset: 78px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, rgba(34, 230, 195, 0.32) 0%, rgba(14, 165, 233, 0.16) 40%, rgba(5, 10, 20, 0.95) 75%);
    border: 1px solid rgba(34, 230, 195, 0.45);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 4px;
  }
  .core .pct {
    font-family: var(--font-rounded);
    font-size: 30px; font-weight: 800;
    color: var(--primary-glow);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .core .lbl {
    font-size: 11px;
    font-weight: 650;
    color: var(--on-surface-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .step-line {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: var(--r-md);
    border: 1px solid rgba(38, 54, 83, 0.55);
    font-size: 14px;
  }
  .step-line + .step-line { margin-top: 8px; }
  .step-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--outline-strong);
    flex-shrink: 0;
    position: relative;
  }
  .step-line.done .step-dot {
    background: var(--protected); border-color: var(--protected);
  }
  .step-line.done .step-dot::after {
    content: ''; position: absolute; left: 3px; top: 0;
    width: 4px; height: 8px;
    border-right: 1.5px solid var(--black);
    border-bottom: 1.5px solid var(--black);
    transform: rotate(45deg);
  }
  .step-line.active .step-dot {
    border-color: var(--primary);
    background: var(--primary);
    box-shadow: 0 0 0 4px rgba(34, 230, 195, 0.18);
  }
  .step-line.pending { color: var(--on-surface-muted); }
  .step-line .meta { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: var(--on-surface-subtle); }
</style>
</head>
<body>
<div class="phone">
  <div class="bg"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#F8FBFF"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="#F8FBFF"/><rect x="10" y="2" width="3" height="10" rx="0.5" fill="#F8FBFF"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#F8FBFF"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.5l2-2.4a3 3 0 00-4 0l2 2.4z" fill="#F8FBFF"/><path d="M3.5 6.4a8 8 0 0110 0" stroke="#F8FBFF" stroke-width="1.6" stroke-linecap="round" fill="none"/><path d="M0.7 3.6a12 12 0 0115.6 0" stroke="#F8FBFF" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="#F8FBFF" stroke-opacity="0.6" fill="none"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="#F8FBFF"/><rect x="23.5" y="4" width="2" height="5" rx="0.6" fill="#F8FBFF" opacity="0.6"/></svg>
    </div>
  </div>

  <div class="screen-body" style="padding-bottom: 88px;">
    <div class="app-header">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#22E6C3" stroke-width="1.5"/><path d="M11 4l5 2v4c0 4-2 6-5 7-3-1-5-3-5-7V6z" fill="#22E6C3"/></svg>
        ProxyShield
      </div>
      <div class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="4" r="1.6" fill="#F8FBFF"/><circle cx="10" cy="10" r="1.6" fill="#F8FBFF"/><circle cx="10" cy="16" r="1.6" fill="#F8FBFF"/></svg>
      </div>
    </div>

    <div style="text-align: center; margin: 4px 0 12px;">
      <div class="chip chip-glow" style="margin-bottom: 12px;"><span class="dot" style="background: var(--black)"></span> Connecting</div>
      <h1 class="t-hero" style="margin: 0 0 6px;">Finding fastest<br>server…</h1>
      <p class="t-cap muted" style="margin: 0;">Hold tight. Average setup: 1.2 seconds.</p>
    </div>

    <div class="stage">
      <div class="ring r0"></div>
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="sweep"></div>
      <div class="core">
        <div class="pct">68%</div>
        <div class="lbl">Securing</div>
      </div>
    </div>

    <div class="stack stack-sm" style="margin-bottom: 16px;">
      <div class="step-line done">
        <div class="step-dot"></div>
        <span>Checked network</span>
        <span class="meta">0.2s</span>
      </div>
      <div class="step-line done">
        <div class="step-dot"></div>
        <span>Picked Stockholm · 24 ms</span>
        <span class="meta">0.4s</span>
      </div>
      <div class="step-line active">
        <div class="step-dot"></div>
        <span style="color: var(--on-surface);">Securing connection · WireGuard</span>
        <span class="meta">…</span>
      </div>
      <div class="step-line pending">
        <div class="step-dot"></div>
        <span>Verifying encrypted route</span>
      </div>
    </div>

    <button class="btn btn-secondary" disabled style="opacity: 0.7;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="margin-right: 4px;"><circle cx="9" cy="9" r="7" stroke="#9BAAC2" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/></svg>
      Connecting…
    </button>
  </div>

  <div class="tabbar">
    <div class="tab active">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2 L19 6 L19 12 C19 17 15 20 11 21 C7 20 3 17 3 12 L3 6 Z" fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="1.6"/><path d="M7 11 L10 14 L15 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      Connect
    </div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M3 11h16M11 3c2.5 3 2.5 13 0 16M11 3c-2.5 3-2.5 13 0 16" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>Locations</div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6" fill="none"/><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>Privacy</div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M11 2v3M11 17v3M2 11h3M17 11h3M4.5 4.5l2 2M15.5 15.5l2 2M4.5 17.5l2-2M15.5 6.5l2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Settings</div>
  </div>
  <div class="home-indicator"></div>
</div>
</body>
</html>
