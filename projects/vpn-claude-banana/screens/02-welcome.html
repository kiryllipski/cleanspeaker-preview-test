<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome · ProxyShield</title>
<link rel="stylesheet" href="../components/shared.css">
<style>
  .welcome-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(34, 230, 195, 0.18) 0%, rgba(14, 165, 233, 0.10) 28%, rgba(5, 10, 20, 0) 60%),
      var(--bg);
  }
  .hero-stage {
    position: absolute;
    top: 70px; left: 0; right: 0;
    height: 380px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .hero-orb {
    position: relative; width: 320px; height: 320px;
  }
  .hero-orb svg { position: absolute; inset: 0; }
  .hero-orb .glow-ring {
    position: absolute; inset: 90px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    box-shadow: 0 0 40px rgba(34, 230, 195, 0.55), inset 0 0 30px rgba(34, 230, 195, 0.45);
  }
  .hero-orb .glow-core {
    position: absolute; inset: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, rgba(46, 242, 208, 0.6) 0%, rgba(14, 165, 233, 0.32) 35%, rgba(13, 22, 40, 0.95) 70%);
    display: flex; align-items: center; justify-content: center;
  }
  .content {
    position: absolute;
    bottom: 168px;
    left: var(--screen-pad); right: var(--screen-pad);
  }
  .content h1 { margin: 0 0 12px; }
  .restore {
    text-align: center;
    color: var(--on-surface-muted);
    font-size: 14px;
    margin-top: 14px;
    padding: 12px;
  }
  .restore u { text-decoration: none; color: var(--on-surface); font-weight: 650; border-bottom: 1px solid var(--outline-strong); padding-bottom: 1px; }
</style>
</head>
<body>
<div class="phone">
  <div class="welcome-bg"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#F8FBFF"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="#F8FBFF"/><rect x="10" y="2" width="3" height="10" rx="0.5" fill="#F8FBFF"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#F8FBFF"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.5l2-2.4a3 3 0 00-4 0l2 2.4z" fill="#F8FBFF"/><path d="M3.5 6.4a8 8 0 0110 0" stroke="#F8FBFF" stroke-width="1.6" stroke-linecap="round" fill="none"/><path d="M0.7 3.6a12 12 0 0115.6 0" stroke="#F8FBFF" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="#F8FBFF" stroke-opacity="0.6" fill="none"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="#F8FBFF"/><rect x="23.5" y="4" width="2" height="5" rx="0.6" fill="#F8FBFF" opacity="0.6"/></svg>
    </div>
  </div>

  <div class="hero-stage">
    <div class="hero-orb">
      <svg viewBox="0 0 320 320" fill="none">
        <!-- outer faint circles -->
        <circle cx="160" cy="160" r="158" stroke="#263653" stroke-opacity="0.5"/>
        <circle cx="160" cy="160" r="135" stroke="#263653" stroke-opacity="0.7"/>
        <circle cx="160" cy="160" r="112" stroke="#38506F" stroke-opacity="0.6"/>
        <!-- tick marks at 12 positions -->
        <g stroke="#38506F" stroke-width="1.5" stroke-linecap="round">
          <line x1="160" y1="2" x2="160" y2="12"/>
          <line x1="239" y1="20" x2="234" y2="29"/>
          <line x1="298" y1="78" x2="289" y2="83"/>
          <line x1="318" y1="160" x2="308" y2="160"/>
          <line x1="298" y1="242" x2="289" y2="237"/>
          <line x1="239" y1="300" x2="234" y2="291"/>
          <line x1="160" y1="318" x2="160" y2="308"/>
          <line x1="81" y1="300" x2="86" y2="291"/>
          <line x1="22" y1="242" x2="31" y2="237"/>
          <line x1="2" y1="160" x2="12" y2="160"/>
          <line x1="22" y1="78" x2="31" y2="83"/>
          <line x1="81" y1="20" x2="86" y2="29"/>
        </g>
        <!-- node dots on mid ring -->
        <g fill="#22E6C3">
          <circle cx="160" cy="25" r="2.5" opacity="0.9"/>
          <circle cx="295" cy="160" r="2" opacity="0.5"/>
          <circle cx="160" cy="295" r="2" opacity="0.7"/>
          <circle cx="25" cy="160" r="2" opacity="0.5"/>
          <circle cx="252" cy="68" r="1.8" opacity="0.4"/>
          <circle cx="252" cy="252" r="1.8" opacity="0.4"/>
          <circle cx="68" cy="252" r="1.8" opacity="0.4"/>
          <circle cx="68" cy="68" r="1.8" opacity="0.4"/>
        </g>
      </svg>
      <div class="glow-ring"></div>
      <div class="glow-core">
        <svg width="64" height="76" viewBox="0 0 64 76" fill="none">
          <path d="M32 3 L58 13 L58 38 C58 55 47 70 32 74 C17 70 6 55 6 38 L6 13 Z"
                fill="url(#sf)" stroke="#2EF2D0" stroke-width="1.5"
                style="filter: drop-shadow(0 0 8px rgba(46,242,208,0.5))"/>
          <path d="M19 38 L28 46 L46 28" stroke="#041018" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sf" x1="32" y1="3" x2="32" y2="74">
              <stop offset="0" stop-color="#2EF2D0"/>
              <stop offset="1" stop-color="#0EA5E9"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
  </div>

  <div class="content">
    <h1 class="t-display text-center">Stay safe<br>online.</h1>
    <p class="t-body text-center muted" style="margin: 0 12px;">
      Hide your IP, secure unsafe Wi-Fi, and block trackers in one tap. No browsing logs.
    </p>
  </div>

  <div class="sticky-cta">
    <button class="btn btn-primary">Get started</button>
    <div class="restore">Already a member? <u>Restore purchase</u></div>
  </div>

  <div class="home-indicator"></div>
</div>
</body>
</html>
