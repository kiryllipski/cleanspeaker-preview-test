    --dark-2:#111B1C;
    --dark-3:#16252A;
    --dark-4:#1F2F32;
    --light:#F6F8F7;

    --muted-2:#8A9998;

    --shadow-pop: 0 8px 30px rgba(8,16,18,.18);
    --font: -apple-system, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:#0B1416;font-family:var(--font);color:var(--text);overscroll-behavior:none;}
  body{
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    background:
      radial-gradient(80% 60% at 20% 0%, #142428 0%, #0B1416 60%),
      radial-gradient(60% 60% at 100% 100%, #0E1F1C 0%, #0B1416 70%),
      #0B1416;
  }
  /* Hide scrollbars inside phone */
  .noscroll::-webkit-scrollbar{display:none;}
  .noscroll{scrollbar-width:none;}

  /* Render-only animations */
  @keyframes scanY {
    0%{transform:translateY(-100%)} 100%{transform:translateY(100%)}
  }
  @keyframes pulseDot {
    0%,100%{opacity:.45;transform:scale(1)}
    50%{opacity:1;transform:scale(1.25)}
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:none}
  }
  @keyframes shimmer {
    0%{background-position:-200% 0}
    100%{background-position:200% 0}
  }
  @keyframes spin { to { transform: rotate(360deg);} }
</style>

      <div style={{position:"absolute", left:-2, top:300, width:3, height:60, background:"#0a0c0d", borderRadius:2}}/>

function Pill({ children, color="teal", size="sm", style={} }) {
  const colors = {
    teal:    { bg:"#DDF8F2", fg:"#0EA587" },
    teal_d:  { bg:"rgba(17,188,155,.16)", fg:"#11BC9B" },
    dark:    { bg:"rgba(255,255,255,.08)", fg:"#F8FAF9" },
    light:   { bg:"#F1F4F3", fg:"#667277" },
    pro:     { bg:"linear-gradient(135deg,#11BC9B,#0EA587)", fg:"#fff" },
  };
  const c = colors[color];
  const small = size==="sm";
  return <span style={{
    display:"inline-flex", alignItems:"center", gap:6,
    background:c.bg, color:c.fg,
    fontSize: small? 11:13, fontWeight:600,
    padding: small ? "4px 9px" : "6px 12px",
    borderRadius:99, lineHeight:1, letterSpacing:.2,
    ...style,
  }}>{children}</span>;
}

function Button({ children, variant="primary", icon, onClick, style={}, full=true }) {
  const styles = {
    primary: { bg:"#11BC9B", fg:"#04201B", border:"none" },
    primary_dark: { bg:"#11BC9B", fg:"#04201B", border:"none" },
    dark: { bg:"#0D1718", fg:"#F8FAF9", border:"none" },
    light:{ bg:"#FFFFFF", fg:"#111827", border:"1px solid var(--border)" },
    glass:{ bg:"rgba(255,255,255,0.08)", fg:"#F8FAF9", border:"1px solid rgba(255,255,255,0.12)" },
    ghost:{ bg:"transparent", fg:"#11BC9B", border:"none" },
  };
  const s = styles[variant];
  return <button onClick={onClick} style={{
    width: full ? "100%" : "auto",
    display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8,
    height:54, borderRadius:18,
    background:s.bg, color:s.fg, border:s.border,
    fontFamily:"var(--font)", fontSize:17, fontWeight:600,
    cursor:"pointer", letterSpacing:.1,
    ...style,
  }}>{icon}{children}</button>;
}

/* Slider with rendered thumb */
function Slider({ value=50, color="#11BC9B", track="rgba(255,255,255,.16)", onChange }) {
  const [v, setV] = React.useState(value);
  React.useEffect(()=>setV(value), [value]);
  const ref = React.useRef(null);
  const drag = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const move = (clientX) => {
      const p = Math.max(0, Math.min(100, ((clientX - rect.left)/rect.width)*100));
      setV(p); onChange && onChange(p);
    };
    const onMove = (ev) => {
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      move(cx);
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove);
    window.addEventListener("touchend", onUp);
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    move(cx);
  };
  return (
    <div ref={ref} onMouseDown={drag} onTouchStart={drag}
      style={{position:"relative", height:30, padding:"13px 0", cursor:"pointer", touchAction:"none"}}>
      <div style={{height:4, borderRadius:99, background:track, position:"relative"}}>
        <div style={{position:"absolute", left:0, top:0, height:4, borderRadius:99, background:color, width:v+"%"}}/>
      </div>
      <div style={{
        position:"absolute", top:"50%", left:`calc(${v}% - 12px)`,
        width:24, height:24, borderRadius:99, background:"#fff",
        boxShadow:"0 1px 2px rgba(0,0,0,.18), 0 4px 14px rgba(0,0,0,.16)",
        transform:"translateY(-50%)",
      }}/>
    </div>
  );
}

window.Pill = Pill;
window.Button = Button;
window.Slider = Slider;
function Onboarding(){
  const [splitPct, setSplitPct] = React.useState(52);
  const drag = (e)=>{
    const card = e.currentTarget.closest("[data-hero]");
    if(!card) return;
    const rect = card.getBoundingClientRect();
    const move = (cx)=>{
      const p = Math.max(8, Math.min(92, ((cx - rect.left)/rect.width)*100));
      setSplitPct(p);
    };
    const onMove = (ev)=>{
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      move(cx);
    };
    const onUp = ()=>{
      window.removeEventListener("mousemove", onMove);

    window.addEventListener("touchend", onUp);
    onMove(e);

/* SVG-rendered photographic scene so the prototype works offline.

function Photo({ kind="street", filter, mask, style }){
  const Inner = {
    street: <StreetScene/>,
    portrait: <PortraitScene/>,
    product: <ProductScene/>,
    doorstep: <DoorstepScene/>,
    bokeh: <BokehScene/>,
  }[kind] || <StreetScene/>;

  return (
    <div style={{
      position:"absolute", inset:0,
      filter, ...style,
    }}>
      <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice"
        style={{width:"100%", height:"100%", display:"block"}}>
        {Inner}
      </svg>
      {mask}
    </div>
  );
}

    mode==="soft" ? `blur(${blurAmt}px) saturate(1.05)` :

    mode==="mosaic" ? `blur(.5px)` : null;

    <div style={{

          <div style={{
            position:"absolute", inset:0,
            clipPath:`inset(0 0 0 ${split}%)`,
          }}>
            <Photo kind={kind} filter={filter}/>
            {redactions && <PhotoRedactions/>}
            {mode==="pixelate" && <PixelGridOverlay/>}
            {mode==="mosaic" && <MosaicOverlay/>}
            {mode==="redact" && <RedactBars/>}

            letterSpacing:.4, textTransform:"uppercase",
          }}>After</div>
        </>
      )}

      {scan && <ScanOverlay/>}
      {mask}

      {children}
    </div>
  );
}

function ScanOverlay(){
  return (
    <div style={{position:"absolute", inset:0, pointerEvents:"none", overflow:"hidden"}}>
      {/* scan line */}
      <div style={{
        position:"absolute", left:0, right:0, height:120,
        background:"linear-gradient(180deg, rgba(17,188,155,0) 0%, rgba(17,188,155,.5) 50%, rgba(17,188,155,0) 100%)",
        animation:"scanY 2.4s ease-in-out infinite",
      }}/>
      {/* corner marks */}
      {[
        {top:14,left:14},{top:14,right:14},{bottom:14,left:14},{bottom:14,right:14},
      ].map((p,i)=>{
        const cls = {
          width:18, height:18, position:"absolute", borderColor:"#11BC9B",
          borderStyle:"solid", borderWidth:0, ...p
        };
        if(p.top && p.left)   { cls.borderTopWidth=2; cls.borderLeftWidth=2; }
        if(p.top && p.right)  { cls.borderTopWidth=2; cls.borderRightWidth=2; }
        if(p.bottom && p.left){ cls.borderBottomWidth=2; cls.borderLeftWidth=2; }
        if(p.bottom && p.right){cls.borderBottomWidth=2; cls.borderRightWidth=2; }
        return <div key={i} style={cls}/>;
      })}
    </div>
  );
}

function PixelGridOverlay(){
  return (
    <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice"
      style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none"}}>
      <defs>
        <pattern id="pix" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
          <rect width="22" height="22" fill="rgba(0,0,0,0)"/>
          <rect width="22" height="22" fill="rgba(0,0,0,0)" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
        </pattern>
      </defs>
      <rect width="600" height="800" fill="url(#pix)"/>
    </svg>
  );
}

function MosaicOverlay(){
  return (
    <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice"
      style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none"}}>
      {Array.from({length: 800/22}).map((_,r)=>Array.from({length: 600/22}).map((_,c)=>{
        const seed = (r*7 + c*3) % 9;
        const fill = ["#A38166","#7C5F4A","#C8A286","#5E4633","#9B7758","#3D5460","#5C7C84","#7B5634","#0F1A1F"][seed];
        return <rect key={`mo${r}${c}`} x={c*22} y={r*22} width={22} height={22} fill={fill} fillOpacity={(r>14 && r<22 && c>9 && c<16) ? .7 : 0}/>;
      }))}
    </svg>
  );
}

function RedactBars(){
  return (
    <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice"
      style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none"}}>
      <rect x="220" y="320" width="160" height="60" rx="4" fill="#0D1718"/>
      <rect x="438" y="610" width="84" height="26" rx="4" fill="#0D1718"/>
    </svg>
  );
}

    const root = e.currentTarget.closest("[data-canvas-root]");
    if(!root) return;
    const rect = root.getBoundingClientRect();
    const move = (cx)=>{
      const p = Math.max(8, Math.min(92, ((cx - rect.left)/rect.width)*100));
      setSplit(p);
    };
    const onMove = (ev)=>{
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      move(cx);
    };
    const onUp = ()=>{
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove);
    window.addEventListener("touchend", onUp);
    onMove(e);
  };

  const blurAmt = 4 + (intensity/100)*22;

  return (
    <div style={{position:"absolute", inset:0, background:"var(--dark)", color:"#F8FAF9"}}>

        <div style={{
          position:"absolute", left:14, top:14,
          background:"rgba(13,23,24,.6)", color:"#F8FAF9",

          display:"flex", alignItems:"center", gap:6,
        }}>
          <span style={{
            width:6, height:6, borderRadius:99, background:"#11BC9B",

function ResultSplit(){
  const [split, setSplit] = React.useState(50);
  const drag = (e)=>{
    const root = e.currentTarget.closest("[data-result-root]");
    if(!root) return;
    const rect = root.getBoundingClientRect();
    const move = (cx)=>{
      const p = Math.max(8, Math.min(92, ((cx - rect.left)/rect.width)*100));
      setSplit(p);
    };
    const onMove = (ev)=>{
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      move(cx);
    };
    const onUp = ()=>{
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove);
    window.addEventListener("touchend", onUp);
    onMove(e);
  };
  return (
    <div data-result-root style={{position:"absolute", inset:0}}>
      <div style={{position:"absolute", inset:0}}><Photo kind="product"/></div>
      {/* AFTER: cleaned-up product photo (mask out notebook + key) */}
      <div style={{
        position:"absolute", inset:0,
        clipPath:`inset(0 0 0 ${split}%)`,
      }}>
        <Photo kind="product"/>
        {/* paint over removed objects with same wood color to imitate inpaint */}
        <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice"
          style={{position:"absolute", inset:0, width:"100%", height:"100%"}}>
          <defs>
            <linearGradient id="patch" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#B68F65"/><stop offset="100%" stopColor="#7A5634"/>
            </linearGradient>
          </defs>
          <rect x="56" y="595" width="226" height="50" rx="2" fill="url(#patch)"/>
          <ellipse cx="438" cy="616" rx="60" ry="32" fill="url(#patch)"/>
          {/* faint grain to match wood */}
          {Array.from({length:5}).map((_,i)=>(
            <rect key={i} x="56" y={596+i*10} width="226" height="1.5" fill="rgba(0,0,0,.06)"/>
          ))}
          <ellipse cx="438" cy="618" rx="58" ry="2" fill="rgba(0,0,0,.06)"/>
        </svg>
      </div>
      <div onMouseDown={drag} onTouchStart={drag} style={{position:"absolute", inset:0, touchAction:"none"}}>
        <SplitHandle pct={split}/>
      </div>
      <div style={{
        position:"absolute", left:14, top:14,
        background:"rgba(13,23,24,.6)", color:"#F8FAF9",
        fontSize:11, fontWeight:600, padding:"5px 10px", borderRadius:99,
        letterSpacing:.4, textTransform:"uppercase", backdropFilter:"blur(10px)",
      }}>Before</div>
      <div style={{
        position:"absolute", right:14, top:14,
        background:"rgba(17,188,155,.92)", color:"#04201B",
        fontSize:11, fontWeight:700, padding:"5px 10px", borderRadius:99,
        letterSpacing:.4, textTransform:"uppercase",
      }}>After</div>
    </div>
  );
}
