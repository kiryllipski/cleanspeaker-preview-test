<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CleanSpeaker — Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(800px 600px at 70% 20%, rgba(37,182,245,0.10), transparent 60%),
        radial-gradient(700px 500px at 20% 90%, rgba(14,124,196,0.08), transparent 60%),
        #04070D;
      display: flex; flex-direction: column;
      align-items: center; padding: 28px 20px 40px;
      font-family: var(--f-ui);
    }
    .app-shell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .app-title {
      text-align: center; margin-bottom: 6px;
    }
    .app-title h1 {
      font-size: 18px; font-weight: 600; margin: 0;
      letter-spacing: -0.01em;
    }
    .app-title p {
      font-size: 12px; color: var(--fg-2); margin: 4px 0 0;
    }
    .device {
      width: 432px;
      height: 902px;
      background: linear-gradient(160deg, #1a2030 0%, #0a0e16 50%, #1a2030 100%);
      border-radius: 56px;
      padding: 12px;
      box-shadow:
        inset 0 0 0 1.5px rgba(255,255,255,0.07),
        inset 0 0 0 4px rgba(0,0,0,0.4),
        0 40px 80px -20px rgba(0,0,0,0.6),
        0 0 60px -10px rgba(91,213,255,0.18);
      position: relative;
    }
    .device-screen {
      width: 100%; height: 100%;
      border-radius: 44px;
      overflow: hidden;
      background: #04070D;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .device-screen > div { width: 100%; height: 100%; }
    .device-screen .cs-screen {
      width: 100%; height: 100%;
    }
    /* nav controls under device */
    .controls {
      margin-top: 18px;
      display: flex; align-items: center; gap: 14px;
      padding: 10px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--hairline-2);
      backdrop-filter: blur(20px);
    }
    .controls button {
      width: 36px; height: 36px; border-radius: 999px;
      border: 1px solid var(--hairline-2);
      background: rgba(255,255,255,0.04);
      color: var(--fg-0); cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .controls button:disabled { opacity: 0.3; cursor: default; }
    .controls .label {
      font-size: 12px; color: var(--fg-1); min-width: 130px; text-align: center;
      font-feature-settings: 'tnum';
    }
    .scene-counter {
      color: var(--fg-3); font-size: 11px;
      font-family: var(--f-mono); margin-left: 6px;
    }
    .hint {
      font-size: 11px; color: var(--fg-3); margin-top: 10px;
      letter-spacing: 0.02em;
    }
    /* Tap a screen edge */
    .tap-hint {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 36px; height: 36px; border-radius: 999px;
      background: rgba(91,213,255,0.18);
      border: 1px solid rgba(91,213,255,0.5);
      color: var(--cy-1);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-title">
      <h1>CleanSpeaker — Interactive prototype</h1>
      <p>Use the arrows to step through the flow, or tap inside the phone.</p>
      <div style="display: flex; gap: 10px; margin-top: 18px;">
        <a href="All Screens.html" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; background: rgba(91,213,255,0.06); border: 1px solid rgba(91,213,255,0.22); color: var(--cy-1); text-decoration: none; font-size: 12px; letter-spacing: 0.02em;">All screens →</a>
        <a href="Documentation.html" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--hairline-2); color: var(--fg-1); text-decoration: none; font-size: 12px; letter-spacing: 0.02em;">Documentation</a>
        <a href="Design System.html" style="display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--hairline-2); color: var(--fg-1); text-decoration: none; font-size: 12px; letter-spacing: 0.02em;">Design System</a>
      </div>
    </div>

    <div class="device">
      <div class="device-screen" id="screen-root"></div>
    </div>

    <div class="controls">
      <button id="prev" title="Previous">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 2 L4 7 L9 12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="label">
        <span id="scene-label">Welcome</span>
        <span class="scene-counter" id="scene-counter">— 1 / 13</span>
      </div>
      <button id="next" title="Next">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 2 L10 7 L5 12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="restart" title="Restart" style="width: auto; padding: 0 14px;">
        <span style="font-size: 11px; color: var(--fg-1);">↺ Restart</span>
      </button>
    </div>
    <div class="hint">← / → arrow keys also navigate · Click "Get started" or "Continue" to follow the real flow</div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screens-onboarding.jsx"></script>
  <script type="text/babel" src="screens-app.jsx"></script>
  <script type="text/babel" src="screens-extra.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SCENES = [
      { id: 'permission', label: 'Permission request',         C: ScrPermission },
      { id: 'welcome',   label: 'Welcome',                     C: ScrWelcome },
      { id: 'q1',        label: 'Q1 · What\u2019s wrong?',     C: ScrQ1 },
      { id: 'q2',        label: 'Q2 · When it started',        C: ScrQ2 },
      { id: 'q3',        label: 'Q3 · Phone model',            C: ScrQ3 },
      { id: 'analyzing', label: 'Analyzing',                   C: ScrAnalyzing },
      { id: 'plan',      label: 'Rescue plan',                 C: ScrPlan },
      { id: 'rating',    label: 'Rating moment',               C: ScrRating },
      { id: 'paywall',   label: 'Special offer',               C: ScrPaywall },
      { id: 'downsell',  label: 'Downsell offer',              C: ScrDownsell },
      { id: 'push',      label: 'Notification permission',     C: ScrPush },
      { id: 'empty',     label: 'Empty home (first run)',      C: ScrEmptyHome },
      { id: 'home',      label: 'Home',                        C: ScrHome },
      { id: 'action',    label: 'Quick action',                C: ScrAction },
      { id: 'cycle',     label: 'Deep Clean cycle',            C: ScrCycle },
      { id: 'abort',     label: 'Abort cycle modal',           C: ScrAbortModal },
      { id: 'result',    label: 'Result',                      C: ScrResult },
      { id: 'test',      label: 'Sound Test',                  C: ScrTest },
      { id: 'pulse',     label: 'Pulse Clean',                 C: ScrPulse },
      { id: 'manual',    label: 'Manual Hz',                   C: ScrManual },
      { id: 'locked',    label: 'Premium locked modal',        C: ScrLocked },
      { id: 'settings',  label: 'Settings',                    C: ScrSettings },
      { id: 'offline',   label: 'Offline state',               C: ScrOffline },
    ];

    function defaultStateForScene(id) {
      // Sensible defaults if user lands deep without going through flow
      const defaults = {
        problem: 'water', when: 'today',
        phone: 'Samsung Galaxy S24 Ultra',
        action: { id: 'water-eject', t: 'Water Eject', sub: '165 Hz', i: ICONS.water(22) },
      };
      return defaults;
    }

    function App() {
      const [sceneId, setSceneId] = useState('welcome');
      const [state, setState] = useState({
        problem: null, when: null, phone: null, action: null,
      });

      const idx = SCENES.findIndex(s => s.id === sceneId);
      const scene = SCENES[idx];

      // ensure defaults exist when deep-linked
      useEffect(() => {
        setState(s => {
          const d = defaultStateForScene(sceneId);
          const merged = { ...s };
          for (const k of Object.keys(d)) {
            if (merged[k] == null) merged[k] = d[k];
          }
          return merged;
        });
      }, [sceneId]);

      const nav = (target, payload) => {
        if (target === 'action' && payload) {
          setState(s => ({ ...s, action: payload }));
        }
        if (target === 'cycle' && payload) {
          setState(s => ({ ...s, action: payload }));
        }
        setSceneId(target);
        // update label/counter
      };
      const set = (k, v) => setState(s => ({ ...s, [k]: v }));

      // Wire prev/next buttons
      useEffect(() => {
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');
        const restart = document.getElementById('restart');
        const label = document.getElementById('scene-label');
        const counter = document.getElementById('scene-counter');
        label.textContent = scene.label;
        counter.textContent = `— ${idx + 1} / ${SCENES.length}`;
        prev.disabled = idx === 0;
        next.disabled = idx === SCENES.length - 1;
        const onP = () => idx > 0 && setSceneId(SCENES[idx - 1].id);
        const onN = () => idx < SCENES.length - 1 && setSceneId(SCENES[idx + 1].id);
        const onR = () => setSceneId('welcome');
        prev.addEventListener('click', onP);
        next.addEventListener('click', onN);
        restart.addEventListener('click', onR);
        const onKey = (e) => {
          if (e.key === 'ArrowLeft') onP();
          if (e.key === 'ArrowRight') onN();
        };
        window.addEventListener('keydown', onKey);
        return () => {
          prev.removeEventListener('click', onP);
          next.removeEventListener('click', onN);
          restart.removeEventListener('click', onR);
          window.removeEventListener('keydown', onKey);
        };
      }, [idx]);

      const Scene = scene.C;
      return <Scene nav={nav} state={state} set={set}/>;
    }

    ReactDOM.createRoot(document.getElementById('screen-root')).render(<App/>);
  </script>
</body>
</html>
