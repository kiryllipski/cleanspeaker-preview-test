<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CleanSpeaker — Interactive Prototype</title>
<link rel="stylesheet" href="design-tokens.css"/>
<style>
  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 20%, #DAE3F4 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #E7DDF4 0%, transparent 40%),
      linear-gradient(180deg, #EFF3F9 0%, #E7ECF4 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: var(--font);
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .phone-bezel {
    width: 412px;
    height: 892px;
    border-radius: 56px;
    background: #0E1530;
    padding: 10px;
    box-shadow:
      0 36px 80px rgba(15, 25, 70, 0.32),
      0 12px 30px rgba(15, 25, 70, 0.12),
      inset 0 0 0 1.5px rgba(255,255,255,0.08);
    position: relative;
  }
  .phone-bezel::before {
    /* Side-button highlights */
    content: '';
    position: absolute; left: -2px; top: 140px;
    width: 4px; height: 64px; border-radius: 0 2px 2px 0;
    background: linear-gradient(180deg,#34406A,#1B233F);
  }
  .phone-bezel::after {
    content: '';
    position: absolute; right: -2px; top: 200px;
    width: 4px; height: 100px; border-radius: 2px 0 0 2px;
    background: linear-gradient(180deg,#34406A,#1B233F);
  }

  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 46px;
    background: #fff;
    overflow: hidden;
    position: relative;
    isolation: isolate;
  }

  /* Camera pill */
  .phone-screen::before {
    content: '';
    position: absolute;
    left: 50%; top: 10px;
    transform: translateX(-50%);
    width: 96px; height: 26px;
    border-radius: 14px;
    background: #0E1530;
    z-index: 1000;
    pointer-events: none;
  }

  #app {
    width: 100%;
    height: 100%;
  }

  .label {
    color: #4F587A;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .label .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--blue);
    animation: csPulse 2s ease-in-out infinite;
  }

  /* Adjust status bar inside screen — make it sit below camera pill */
  .phone-screen .cs-statusbar { padding-top: 6px; height: 48px; align-items: flex-end; padding-bottom: 4px; }
</style>
</head>
<body>

<div class="stage">
  <div class="label"><span class="dot"></span> CleanSpeaker — interactive prototype</div>
  <div class="phone-bezel">
    <div class="phone-screen">
      <div id="app"></div>
    </div>
  </div>
</div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks panel + helpers -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Icons + components -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens-onboarding.jsx"></script>
<script type="text/babel" src="screens-paywall.jsx"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-test.jsx"></script>
<script type="text/babel" src="screens-settings.jsx"></script>

<!-- App -->
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
