/* Sonic Clean — premium speaker cleaner */
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #050608;
  --bg-1: #0a0c11;
  --surface: #0f1218;
  --surface-2: #151923;
  --line: rgba(255, 255, 255, 0.06);

  --text: #f4f7fb;
  --text-muted: #8a92a3;
  --text-dim: #565b6b;
  --cyan: #00e5ff;
  --cyan-2: #4cc9f0;
  --cyan-3: #7df9ff;
  --cyan-deep: #0083a6;
  --cyan-glow: rgba(0, 229, 255, 0.55);
  --blue: #2f80ed;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #ff5757;
  --display: 'Onest', system-ui, sans-serif;

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ===== ANDROID FRAME ===== */
.android-frame {
  width: 412px;
  height: 892px;
  border-radius: 56px;
  background: #000;
  position: relative;
  padding: 14px;
  box-shadow:
    0 0 0 2px #1d2129,
    0 0 0 3px #0a0c10,
    0 50px 100px -20px rgba(0, 229, 255, 0.15),
    0 30px 60px -30px rgba(0, 0, 0, 0.7);
  flex-shrink: 0;
}

.android-screen {
  width: 100%;
  height: 100%;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  background: var(--bg);
  isolation: isolate;
}

.android-statusbar {
  height: 44px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  position: relative;
  z-index: 10;
}

.android-statusbar .right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.android-nav {
  position: absolute;
  bottom: 8px;
  left: 0;
  right: 0;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.android-nav .pill {
  width: 120px;
  height: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.6);
}

/* ===== TYPOGRAPHY ===== */
.t-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  font-weight: 500;
}
.t-h1 {
  font-family: var(--display);
  font-size: 32px;
  line-height: 1.05;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.t-h2 {
  font-family: var(--display);
  font-size: 24px;
  line-height: 1.1;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.t-h3 {
  font-family: var(--display);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.t-body {
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.45;
  color: var(--text-muted);

}
.t-caption {
  font-family: var(--body);
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}
.t-num {
  font-family: var(--display);
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  font-weight: 500;
  letter-spacing: -0.02em;
}
.t-mono {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

/* ===== GLASS / SURFACE ===== */
.glass {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01) 60%),
    rgba(15, 18, 24, 0.85);
  border: 1px solid var(--line);
  border-radius: 20px;
  backdrop-filter: blur(20px);

}

.glass-strong {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) 60%),
    rgba(20, 25, 33, 0.95);

  border-radius: 24px;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
}

/* ===== BUTTONS ===== */
.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  height: 60px;
  border-radius: 100px;
  border: 0;
  cursor: pointer;
  font-family: var(--display);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;

    0 0 0 1px rgba(255,255,255,0.2) inset,

  position: relative;

  transition: transform 0.15s ease, box-shadow 0.2s ease;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 100px;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent 40%);
  pointer-events: none;
  mask: linear-gradient(black, black);
}

.btn-ghost {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 56px;
  border-radius: 100px;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,0.02);
  color: var(--text);
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}

.btn-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* ===== CHIPS ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 100px;
  background: rgba(0, 229, 255, 0.08);

  color: var(--cyan);

  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.chip-muted {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line-strong);
  color: var(--text-muted);
}

/* ===== ANIMATED BG GLOW ===== */
.bg-glow {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.bg-glow::before {
  content: '';
  position: absolute;
  top: -10%;
  left: 50%;
  width: 130%;
  height: 80%;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at center, var(--cyan-glow) 0%, transparent 60%);
  filter: blur(60px);
  opacity: 0.55;
  animation: pulseGlow 4.5s ease-in-out infinite;
}
.bg-glow::after {
  content: '';
  position: absolute;
  bottom: -20%;
  left: 50%;
  width: 100%;
  height: 60%;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at center, rgba(0, 229, 255, 0.25), transparent 60%);
  filter: blur(40px);
  animation: pulseGlow 6s ease-in-out infinite reverse;
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.75; }
}

.dot-grid {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  opacity: 0.6;
}

/* ===== WAVEFORM ===== */
.wave-row {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 40px;
}
.wave-row > i {
  display: block;
  width: 3px;

  border-radius: 4px;
  box-shadow: 0 0 8px var(--cyan-glow);
  animation: waveBar 1.4s ease-in-out infinite;
}
@keyframes waveBar {
  0%, 100% { height: 20%; opacity: 0.5; }
  50% { height: 100%; opacity: 1; }
}

/* ===== CIRCULAR DIAL ===== */
.dial-ring {

  width: 280px;
  height: 280px;
}

/* ===== ALL-SCREENS PAGE ===== */
.gallery {

  gap: 32px;

.screen-card {

}

.screen-card .frame {

.screen-card .meta {

}
.screen-card .meta .num {
  color: var(--cyan);

}
.screen-card .meta .title {
  color: var(--text);

  font-size: 13px;

.gallery-hero .sub {

}

/* utility */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.center { align-items: center; justify-content: center; }
.between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.gap-5 { gap: 20px; }
.gap-6 { gap: 24px; }
.mt-auto { margin-top: auto; }

/* ===== PROTOTYPE SHELL ===== */
.proto-stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background:
    radial-gradient(ellipse at top, rgba(0,229,255,0.06), transparent 50%),
    var(--bg);
  position: relative;
}

.proto-rail {
  position: fixed;
  top: 24px;
  left: 24px;
  right: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
  pointer-events: none;
}
.proto-rail > * { pointer-events: auto; }

.proto-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.proto-brand .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
  animation: pulseGlow 1.6s ease-in-out infinite;
}

.proto-stepbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: rgba(15, 18, 24, 0.85);
  border: 1px solid var(--line);
  border-radius: 100px;
  backdrop-filter: blur(20px);
}
.proto-stepbar .seg {
  width: 24px;
  height: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.proto-stepbar .seg.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
.proto-stepbar .seg.done { background: rgba(0, 229, 255, 0.4); }
.proto-stepbar .label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-left: 8px;
}

.proto-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(15, 18, 24, 0.85);
  border: 1px solid var(--line);
  border-radius: 100px;
  backdrop-filter: blur(20px);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.proto-controls button {
  background: transparent;
  border: 0;
  color: var(--text);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.proto-controls button:hover { color: var(--cyan); }

/* page transitions */
.screen-enter {
  animation: screenEnter 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
@keyframes screenEnter {
  from { opacity: 0; transform: translateY(8px) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* sliders */
.slider-track {
  position: relative;
  height: 8px;
  border-radius: 100px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.slider-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: linear-gradient(90deg, var(--cyan-deep), var(--cyan));
  box-shadow: 0 0 12px var(--cyan-glow);
  border-radius: 100px;
}

/* checkmark animation */
@keyframes checkPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

/* sound wave ring pulse */

  100% { transform: scale(2.2); opacity: 0; }
}

const { useState, useEffect, useRef, useMemo } = React;

// Status bar (Android)

// Real waveform — sinusoidal pattern, vertical bars
function WaveformBars({ count = 60, color = 'var(--cyan)', height = 80, animated = true, baseAmp = 0.4, randomSeed = 1 }) {
  const bars = useMemo(() => {
    return Array.from({ length: count }).map((_, i) => {
      const t = i / count;
      // mix of two sines for organic feel
      const v = Math.abs(Math.sin(t * Math.PI * 4 + randomSeed) * 0.6 + Math.sin(t * Math.PI * 9 + randomSeed * 2) * 0.4);
      return Math.max(0.08, baseAmp + v * 0.6);
    });
  }, [count, baseAmp, randomSeed]);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, height, justifyContent: 'center' }}>
      {bars.map((v, i) => (
        <i key={i} style={{
          display: 'block',
          width: 3,
          height: `${v * 100}%`,
          background: color,
          borderRadius: 4,
          boxShadow: `0 0 8px ${color === 'var(--cyan)' ? 'rgba(0,229,255,0.55)' : color}`,
          animation: animated ? `waveBar ${1 + (i % 5) * 0.2}s ease-in-out infinite ${(i % 7) * 0.08}s` : 'none',
          opacity: 0.85
        }} />
      ))}
    </div>
  );
}

// Frequency circular dial
function FrequencyDial({ size = 280, value = 680, min = 100, max = 2000, label = 'Frequency', state = 'idle', progress = 0 }) {
  const cx = size / 2;
  const cy = size / 2;
  const radius = size / 2 - 28;
  const circumference = 2 * Math.PI * radius;
  const angle = ((value - min) / (max - min)) * 360 - 90;
  const indicatorX = cx + Math.cos(angle * Math.PI / 180) * radius;
  const indicatorY = cy + Math.sin(angle * Math.PI / 180) * radius;
  const offset = circumference - (progress * circumference);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <div style={{
        position: 'absolute', inset: -20,
        background: 'radial-gradient(circle, rgba(0,229,255,0.3) 0%, transparent 60%)',
        filter: 'blur(20px)'
      }} />
      <svg viewBox={`0 0 ${size} ${size}`} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        <defs>
          <linearGradient id="fd-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#7df9ff"/>
            <stop offset="100%" stopColor="#0083a6"/>
          </linearGradient>
        </defs>
        {/* tick marks around */}
        {Array.from({ length: 60 }).map((_, i) => {
          const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
          const r1 = radius + 6;
          const r2 = radius + (i % 5 === 0 ? 16 : 10);
          const x1 = cx + Math.cos(a) * r1;
          const y1 = cy + Math.sin(a) * r1;
          const x2 = cx + Math.cos(a) * r2;
          const y2 = cy + Math.sin(a) * r2;
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={i % 5 === 0 ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)'} strokeWidth={1} />;
        })}
        {/* track */}
        <circle cx={cx} cy={cy} r={radius} stroke="rgba(255,255,255,0.06)" strokeWidth={2} fill="none" />
        {/* progress arc */}
        <circle cx={cx} cy={cy} r={radius}
          stroke="url(#fd-grad)"
          strokeWidth={3}
          fill="none"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{ filter: 'drop-shadow(0 0 8px rgba(0, 229, 255, 0.7))', transition: 'stroke-dashoffset 0.4s ease' }}
        />
        {/* indicator dot */}
        <circle cx={indicatorX} cy={indicatorY} r={6} fill="#fff" />
        <circle cx={indicatorX} cy={indicatorY} r={10} fill="rgba(0,229,255,0.4)" />
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 4
      }}>
        <div className="t-eyebrow" style={{ fontSize: 10 }}>{label}</div>
        <div style={{ fontFamily: 'Onest', fontSize: 56, fontWeight: 600, letterSpacing: '-0.04em', lineHeight: 1 }}>
          {value}
        </div>
        <div className="t-caption" style={{ fontFamily: 'JetBrains Mono', textTransform: 'uppercase', letterSpacing: '0.12em' }}>Hz</div>
      </div>
    </div>
  );
}

// Sound wave horizontal animated line (sinusoidal)
function SineWaveLine({ width = 320, height = 80, color = 'var(--cyan)', amplitude = 0.6, frequency = 4, phase = 0 }) {
  const points = useMemo(() => {
    const pts = [];
    for (let x = 0; x <= width; x += 2) {
      const t = x / width;
      const y = height / 2 + Math.sin(t * Math.PI * frequency * 2 + phase) * (height / 2 - 6) * amplitude * Math.exp(-Math.abs(t - 0.5) * 1.5);
      pts.push(`${x},${y}`);
    }
    return pts.join(' ');
  }, [width, height, amplitude, frequency, phase]);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <defs>
        <linearGradient id={`sine-grad-${phase}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={color} stopOpacity="0.1"/>
          <stop offset="50%" stopColor={color} stopOpacity="1"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.1"/>
        </linearGradient>
      </defs>
      <polyline points={points} fill="none" stroke={`url(#sine-grad-${phase})`} strokeWidth="2" strokeLinecap="round" style={{ filter: `drop-shadow(0 0 6px ${color === 'var(--cyan)' ? 'rgba(0,229,255,0.7)' : color})` }}/>
    </svg>
  );
}

// ============ 04 DIAGNOSTIC (analyzing) ============
function ScreenDiagnostic({ onNext, onBack }) {
  const [progress, setProgress] = useState(0);
  const [stage, setStage] = useState(0);
  const stages = [
    { hz: 220, label: 'Listening to ambient response' },
    { hz: 880, label: 'Sweeping midrange' },
    { hz: 1840, label: 'Measuring high-frequency loss' },
  ];
  useEffect(() => {
    let t = 0;
    const id = setInterval(() => {
      t += 1;
      setProgress(p => {
        const n = Math.min(1, p + 0.012);
        if (n >= 0.33 && stage === 0) setStage(1);
        if (n >= 0.66 && stage === 1) setStage(2);
        return n;
      });
    }, 60);
    return () => clearInterval(id);
  }, [stage]);

  useEffect(() => {
    if (progress >= 1) {
      const id = setTimeout(onNext, 600);
      return () => clearTimeout(id);
    }
  }, [progress]);

  const s = stages[stage];
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '20px 24px 36px', overflow: 'hidden' }} className="screen-enter">
      <Header step={3} total={3} onBack={onBack}/>

      <div className="bg-glow" style={{ opacity: 0.6 }}/>

      <div style={{ marginTop: 22, position: 'relative', zIndex: 1 }}>
        <span className="t-eyebrow">Diagnostic in progress</span>
        <h2 style={{ fontFamily: 'Onest', fontSize: 26, fontWeight: 500, lineHeight: 1.08, letterSpacing: '-0.02em', marginTop: 6 }}>
          Analyzing your speaker
        </h2>
      </div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', zIndex: 1 }}>
        <FrequencyDial size={280} value={s.hz} progress={progress} label="Now scanning"/>
      </div>

      <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', borderRadius: 16, background: 'rgba(15,18,24,0.7)', border: '1px solid var(--line-strong)' }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--cyan)', boxShadow: '0 0 8px var(--cyan)', animation: 'pulseGlow 1.2s infinite' }}/>
          <div style={{ fontSize: 13, fontFamily: 'JetBrains Mono', letterSpacing: '0.04em', color: 'var(--text-muted)' }}>{s.label}…</div>
          <div style={{ marginLeft: 'auto', fontFamily: 'JetBrains Mono', fontSize: 12, color: 'var(--cyan)' }}>{Math.round(progress * 100)}%</div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              height: 32, borderRadius: 10,
              padding: '6px 10px',
              border: i <= stage ? '1px solid rgba(0,229,255,0.4)' : '1px solid var(--line-strong)',
              background: i <= stage ? 'rgba(0,229,255,0.08)' : 'rgba(255,255,255,0.02)',
              display: 'flex', alignItems: 'center', gap: 8
            }}>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: i <= stage ? 'var(--cyan)' : 'var(--text-dim)', letterSpacing: '0.08em' }}>
                {`STAGE ${i+1}`}
              </span>
              {i < stage && <Icon.Check c="var(--cyan)" s={12}/>}
              {i === stage && <div className="wave-row" style={{ height: 14, marginLeft: 'auto' }}>
                {[0,1,2,3].map(j => <i key={j} style={{ width: 2, animationDelay: `${j*0.1}s` }}/>) }
              </div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============ 10 CLEANING IN PROGRESS ============
function ScreenCleaning({ onNext, onBack }) {
  const [progress, setProgress] = useState(0);
  const [paused, setPaused] = useState(false);
  const stages = [
    { hz: 165,  label: 'Low — water eject' },
    { hz: 680,  label: 'Mid — debris dislodge' },
    { hz: 1840, label: 'High — clarity restore' },
  ];

  useEffect(() => {
    if (paused) return;
    const id = setInterval(() => {
      setProgress(p => Math.min(1, p + 0.006));
    }, 60);
    return () => clearInterval(id);
  }, [paused]);

  useEffect(() => {
    if (progress >= 1) {
      const id = setTimeout(onNext, 400);
      return () => clearTimeout(id);
    }
  }, [progress]);

  const stageIdx = progress < 0.34 ? 0 : progress < 0.67 ? 1 : 2;
  const s = stages[stageIdx];
  const stageProgress = (progress - stageIdx * 0.333) / 0.333;
  const secondsLeft = Math.ceil((1 - progress) * 60);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '20px 24px 28px', position: 'relative', overflow: 'hidden' }} className="screen-enter">
      <div className="bg-glow" style={{ opacity: 0.5 + stageProgress * 0.4 }}/>
      <Header onBack={onBack} title={`Cleaning · ${stageIdx + 1} of 3`} muted/>

      <div style={{ position: 'relative', zIndex: 1, flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 22 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--cyan)', boxShadow: '0 0 8px var(--cyan)', animation: 'pulseGlow 1s infinite' }}/>
          <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--cyan)', letterSpacing: '0.16em', textTransform: 'uppercase' }}>Live · sweep</span>
        </div>
        <FrequencyDial value={s.hz} progress={progress} label="Frequency"/>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'Onest', fontSize: 18, fontWeight: 600 }}>{s.label}</div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>You can stop at any time</div>
        </div>

        {/* sine wave */}
        <SineWaveLine width={300} height={56} amplitude={0.7} frequency={4 + stageIdx * 2} phase={progress * 30}/>
      </div>

      {/* stage indicators */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 16, position: 'relative', zIndex: 1 }}>
        {[0,1,2].map(i => (
          <div key={i}>
            <div style={{ height: 4, borderRadius: 4, background: 'rgba(255,255,255,0.08)', overflow: 'hidden' }}>
              <div style={{
                height: '100%',
                width: i < stageIdx ? '100%' : i === stageIdx ? `${stageProgress*100}%` : '0%',
                background: 'linear-gradient(90deg, var(--cyan-deep), var(--cyan))',
                boxShadow: '0 0 8px var(--cyan)',
                transition: 'width 0.2s'
              }}/>
            </div>
            <div style={{ marginTop: 6, fontFamily: 'JetBrains Mono', fontSize: 10, color: i <= stageIdx ? 'var(--cyan)' : 'var(--text-dim)', letterSpacing: '0.1em' }}>{`STAGE 0${i+1}`}</div>
          </div>
        ))}
      </div>

      {/* time + controls */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, position: 'relative', zIndex: 1 }}>
        <div style={{
          flex: 1, padding: '14px 18px',
          border: '1px solid var(--line-strong)', background: 'rgba(15,18,24,0.7)',
          borderRadius: 100, display: 'flex', justifyContent: 'space-between', alignItems: 'center'
        }}>
          <div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: '0.12em', color: 'var(--text-muted)', textTransform: 'uppercase' }}>Remaining</div>
            <div style={{ fontFamily: 'Onest', fontSize: 18, fontWeight: 600 }}>0:{String(secondsLeft).padStart(2,'0')}</div>
          </div>
          <Icon.Timer c="var(--text-muted)" s={20}/>
        </div>
        <button onClick={() => setPaused(p => !p)}
          style={{
            width: 56, height: 56, borderRadius: '50%',
            border: '1px solid var(--line-strong)', background: 'rgba(15,18,24,0.7)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'
          }}>
          {paused ? <Icon.Play c="var(--cyan)" s={20}/> : <Icon.Pause c="var(--cyan)" s={20}/>}
        </button>
        <button onClick={onBack}
          style={{

// ============ 12 DEEP CLEAN PRO (manual Hz) ============
function ScreenDeepClean({ onBack, onNext }) {
  const [hz, setHz] = useState(680);
  const [running, setRunning] = useState(false);
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '20px 24px 28px', position: 'relative', overflow: 'hidden' }} className="screen-enter">
      <div className="bg-glow" style={{ opacity: 0.3 }}/>

      <div style={{ marginTop: 6, position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ padding: '3px 8px', borderRadius: 100, background: 'rgba(251,191,36,0.12)', border: '1px solid rgba(251,191,36,0.3)', fontFamily: 'JetBrains Mono', fontSize: 9, color: 'var(--amber)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Pro</span>
        <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Manual frequency control</span>
      </div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', zIndex: 1 }}>
        <FrequencyDial value={hz} progress={(hz - 100) / 1900} label={running ? 'Sweeping' : 'Set frequency'}/>
      </div>

      {/* manual slider */}
      <div style={{ position: 'relative', zIndex: 1, marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>
          <span>100 Hz</span>
          <span>1000 Hz</span>
          <span>2000 Hz</span>
        </div>
        <input type="range" min="100" max="2000" step="10" value={hz} onChange={e => setHz(+e.target.value)}
          style={{ width: '100%', accentColor: '#00e5ff' }}/>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 14 }}>
          {[165, 440, 880, 1840].map(p => (
            <button key={p} onClick={() => setHz(p)}
              style={{
                appearance: 'none', cursor: 'pointer',
                padding: '6px 10px', borderRadius: 100,
                border: hz === p ? '1px solid var(--cyan)' : '1px solid var(--line-strong)',
                background: hz === p ? 'rgba(0,229,255,0.1)' : 'rgba(255,255,255,0.02)',
                color: hz === p ? 'var(--cyan)' : 'var(--text-muted)',
                fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.04em'
              }}>
              {p} Hz
            </button>
          ))}
        </div>
      </div>

      <button className="btn-primary" onClick={() => { setRunning(true); setTimeout(onNext, 800); }}>
        {running ? 'Running…' : 'Start manual sweep'} {!running && <Icon.ArrowRight c="#001318"/>}
      </button>
    </div>
  );
}

// ============ HEADER ============
function Header({ step, total, onBack, title, muted = false }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <button onClick={onBack} style={{
        width: 40, height: 40, borderRadius: 12,
        background: 'rgba(255,255,255,0.04)', border: '1px solid var(--line-strong)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'
      }}>
        <Icon.ArrowLeft c="var(--text-muted)" s={18}/>
      </button>
      {step && total && (
        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
          {Array.from({ length: total }).map((_, i) => (
            <div key={i} style={{
              width: i + 1 === step ? 24 : 6,
              height: 4,
              borderRadius: 4,
              background: i + 1 <= step ? 'var(--cyan)' : 'rgba(255,255,255,0.1)',
              boxShadow: i + 1 === step ? '0 0 8px var(--cyan)' : 'none',
              transition: 'all 0.3s'
            }}/>
          ))}
        </div>
      )}
      {title && !muted && (
        <div style={{ fontFamily: 'Onest', fontSize: 14, fontWeight: 600 }}>{title}</div>
      )}
      {title && muted && (
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{title}</div>
      )}
      <div style={{ width: 40 }}/>
    </div>
  );
}
